<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0a0a0a"/>
  
  <!-- Blue accent border -->
  <rect x="1" y="1" width="30" height="30" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  
  <!-- Corner accents -->
  <line x1="1" y1="1" x2="5" y2="1" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="1" y1="1" x2="1" y2="5" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="31" y1="1" x2="27" y2="1" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="31" y1="1" x2="31" y2="5" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="1" y1="31" x2="5" y2="31" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="1" y1="31" x2="1" y2="27" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="31" y1="31" x2="27" y2="31" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="31" y1="31" x2="31" y2="27" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- JD text - monospace terminal style -->
  <text 
    x="16" 
    y="21" 
    text-anchor="middle" 
    font-family="monospace, Courier New" 
    font-size="13" 
    font-weight="900" 
    fill="#ffffff"
    letter-spacing="-0.5"
  >JD</text>

  <!-- Blue dot accent bottom right - like the blinking cursor -->
  <circle cx="27" cy="25" r="1.5" fill="#3b82f6" opacity="0.8"/>
</svg>